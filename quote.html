<style>

/* ================= RESET ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#bfc1c2;
color:#111;
overflow-x:hidden;
}

/* ================= NAV ================= */

nav{
position:absolute;
top:22px;
left:0;
width:100%;
display:flex;
justify-content:center;
z-index:10;
padding:0 18px;
}

.nav-links{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
background:rgba(30,30,30,0.45);
backdrop-filter:blur(18px);
padding:14px 26px;
border-radius:60px;
border:1px solid rgba(255,255,255,0.25);
}

.nav-row{
display:flex;
gap:24px;
flex-wrap:wrap;
justify-content:center;
}

.nav-links a{
text-decoration:none;
color:white;
letter-spacing:.5px;
}

.phone-row{
font-size:14px;
color:#e6d8b5;
display:flex;
gap:14px;
flex-wrap:wrap;
justify-content:center;
}

.phone-row a{
color:#e6d8b5;
text-decoration:none;
}

/* ================= HERO ================= */

.hero{
height:65vh;
min-height:480px;

background:
linear-gradient(
to bottom,
rgba(0,0,0,.35),
rgba(0,0,0,.75)
),
url("images/newhero5.png") center center / cover no-repeat;

display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}

.hero-content{
padding:95px 20px 0;
}

.hero-content h1{
font-size:3rem;
font-weight:800;
text-shadow:0 10px 30px rgba(0,0,0,.6);
}

/* ================= FORM ================= */

.quote-section{
padding:70px 20px;
display:flex;
justify-content:center;
}

.quote-box{
background:#dedede;
padding:35px;
border-radius:20px;
width:100%;
max-width:650px;
box-shadow:0 10px 25px rgba(0,0,0,.12);
}

form{
display:flex;
flex-direction:column;
gap:18px;
}

input, select, textarea{
padding:14px;
border-radius:12px;
border:1px solid #c8c8c8;
font-size:15px;
width:100%;
}

textarea{
min-height:120px;
resize:vertical;
}

button{
margin-top:6px;
padding:14px;
border:none;
border-radius:30px;
background:#6e6e6e;
color:white;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#555;
}

/* ================= FOOTER ================= */

footer{
text-align:center;
padding:28px 20px;
background:#1b1b1b;
color:white;
font-size:13px;
}

/* ================= MOBILE ================= */

@media (max-width:900px){

.hero{
height:60vh;
}

.hero-content{
padding:115px 20px 0;
}

.hero-content h1{
font-size:2.2rem;
}

.quote-section{
padding:50px 20px;
}

}

</style>
</head>

<nav>

</div>

<span>|</span>
<span>Mustapha: <a href="tel:+447472507204">+44 7472 507204</a></span>
</div>

</div>

<!-- HERO -->
<section class="hero">
<div class="hero-content">
<h1>Get a Quote</h1>
</div>
</section>

<!-- FORM -->
<section class="quote-section">

<div class="quote-box">

<form action="https://formsubmit.co/ishak-1990@outlook.com" method="POST">

<!-- FormSubmit Settings -->
<input type="hidden" name="_subject" value="New ZipZap Quote Request">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">

<input type="text" name="Name" placeholder="Full Name" required>

<input type="email" name="Email" placeholder="Email Address" required>

<input type="tel" name="Phone" placeholder="Phone Number">

<select name="Service" required>
<option value="">Type of Service</option>
<option>House Move</option>
<option>Student Move</option>
<option>Office Relocation</option>
<option>Furniture Delivery</option>
<option>Waste Removal</option>
<option>B2B Transport & Logistics</option>
</select>

<input type="text" name="Pickup Location" placeholder="Pickup Location">
<input type="text" name="Delivery Location" placeholder="Delivery Location">

<textarea name="Details" placeholder="Tell us about your move (items, dates, access, etc.)"></textarea>

<button type="submit">Request Quote</button>

</form>

</div>
